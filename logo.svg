<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 240" width="660" height="240">
<title>arXiTeX logo with wooden X</title>
<defs>
  <linearGradient id="plank1" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#b87030"/>
    <stop offset="30%" stop-color="#e09a48"/>
    <stop offset="70%" stop-color="#c8853a"/>
    <stop offset="100%" stop-color="#b07028"/>
  </linearGradient>
  <linearGradient id="plank2" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#c07828"/>
    <stop offset="30%" stop-color="#d8903a"/>
    <stop offset="70%" stop-color="#e09a48"/>
    <stop offset="100%" stop-color="#b87030"/>
  </linearGradient>
  <filter id="ps">
    <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#7a4010" flood-opacity="0.4"/>
  </filter>
</defs>

<!-- White background -->
<rect width="660" height="240" fill="#ffffff"/>

<!-- "ar" starts at x=50, ends ~210 -->
<text x="50" y="180" font-family="Georgia, serif" font-size="140" font-weight="700" fill="#1a1208" letter-spacing="-2">ar</text>
<!-- "iTeX" starts at x=306 (after the X which spans 210..306) -->
<text x="306" y="180" font-family="Georgia, serif" font-size="140" font-weight="700" fill="#1a1208" letter-spacing="-2">iTeX</text>

<!-- Wooden X centered at cx=258, cy=110 (baseline 180, cap-height ~100px, so top=80, center=130) -->
<!-- Plank 1: top-left to bottom-right, rotate(42, 258, 120) -->
<g filter="url(#ps)">
  <rect x="241" y="43" width="34" height="155" rx="6" fill="url(#plank1)" stroke="#8a5010" stroke-width="1" transform="rotate(42, 258, 120)"/>
  <line x1="246" y1="46" x2="246" y2="198" stroke="#ffd090" stroke-width="0.6" opacity="0.3" transform="rotate(42, 258, 120)"/>
  <line x1="254" y1="44" x2="254" y2="196" stroke="#9a5818" stroke-width="0.7" opacity="0.3" transform="rotate(42, 258, 120)"/>
  <line x1="262" y1="44" x2="262" y2="196" stroke="#ffd090" stroke-width="0.5" opacity="0.2" transform="rotate(42, 258, 120)"/>
  <line x1="270" y1="46" x2="270" y2="198" stroke="#9a5818" stroke-width="0.6" opacity="0.25" transform="rotate(42, 258, 120)"/>
</g>

<!-- Plank 2: top-right to bottom-left, rotate(-42, 258, 120) -->
<g filter="url(#ps)">
  <rect x="241" y="43" width="34" height="155" rx="6" fill="url(#plank2)" stroke="#8a5010" stroke-width="1" transform="rotate(-42, 258, 120)"/>
  <line x1="246" y1="46" x2="246" y2="198" stroke="#ffd090" stroke-width="0.6" opacity="0.3" transform="rotate(-42, 258, 120)"/>
  <line x1="254" y1="44" x2="254" y2="196" stroke="#9a5818" stroke-width="0.7" opacity="0.3" transform="rotate(-42, 258, 120)"/>
  <line x1="262" y1="44" x2="262" y2="196" stroke="#ffd090" stroke-width="0.5" opacity="0.2" transform="rotate(-42, 258, 120)"/>
  <line x1="270" y1="46" x2="270" y2="198" stroke="#9a5818" stroke-width="0.6" opacity="0.25" transform="rotate(-42, 258, 120)"/>
</g>

<!-- Nail at crossing center -->
<circle cx="258" cy="120" r="6" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
<circle cx="258" cy="120" r="2.8" fill="#909090" stroke="#606060" stroke-width="0.8"/>
<circle cx="256" cy="118" r="1" fill="#e0e0e0" opacity="0.7"/>

</svg>
